name: Verify

# Workflow order (do not reorder without re-verifying CI):
#   1. Checkout repository
#   2. Set up Python
#   3. Install base dependencies
#   4. Install API and test dependencies
#   5. Set up Node.js
#   6. Build frontend (ui/dist/ must exist before the verification suite
#      because test_p26b_20 asserts the built import page is present)
#   7. Run full verification suite
#   8. Run validation
#   9. Run security scan
#  10. Run feedback smoke check
#  11. Run export smoke check
#  12. Check generated artefacts are not tracked (runs last so it catches
#      anything any earlier step may have left behind)

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install API and test dependencies
        run: python -m pip install -r mcp/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Build frontend
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Run full verification suite
        run: python mcp/test_verify.py

      - name: Run validation
        run: python run.py validate

      - name: Run security scan
        run: python run.py security

      - name: Run feedback smoke check
        run: python run.py feedback

      - name: Run export smoke check
        run: python run.py export --overwrite

      - name: Check generated artefacts are not tracked
        run: |
          git status --short
          if git status --short | grep -E '^.. (dist/|ui/dist/)'; then
            echo "ERROR: generated artefacts found in working tree"
            exit 1
          fi
